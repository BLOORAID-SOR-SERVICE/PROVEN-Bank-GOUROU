<!DOCTYPE html>
<html lang="en" class="js">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>My Account | PROVEN Bank</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/assets/css/style.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicon/apple-touch-icon.png?02">
    <meta name="robots" content="noindex, nofollow">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#f2f2f2;font-family:RNSSanz,sans-serif;color:#23282d;font-size:1.4rem}
        .profile-header{background:linear-gradient(135deg,#23282d,#3a4249);color:#fff;padding:2rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
        .profile-header .greeting{font-size:1.6rem}
        .profile-header .greeting strong{color:#ef4350}
        .profile-header .logout{color:#fff;text-decoration:none;font-size:1.3rem;cursor:pointer;background:rgba(255,255,255,.1);padding:.5rem 1.2rem;border-radius:.4rem}
        .profile-header .logout:hover{background:#ef4350}
        .balance-card{background:#fff;border-radius:1rem;box-shadow:0 2px 15px rgba(0,0,0,.08);padding:2.5rem;margin-bottom:2rem;text-align:center}
        .balance-card .label{font-size:1.3rem;color:#999;text-transform:uppercase;letter-spacing:.1em}
        .balance-card .amount{font-size:4rem;font-weight:700;color:#23282d;margin:.5rem 0}
        .balance-card .amount span{color:#ef4350}
        .balance-card .account-info{font-size:1.3rem;color:#666;margin-top:.5rem}
        .profile-layout{display:flex;min-height:calc(100vh - 7rem)}
        .profile-sidebar{width:22rem;background:#fff;border-right:1px solid #ddd;padding:2rem 0;flex-shrink:0}
        .profile-sidebar a{display:block;padding:1.2rem 2rem;color:#23282d;text-decoration:none;font-size:1.4rem;border-left:3px solid transparent;cursor:pointer}
        .profile-sidebar a:hover,.profile-sidebar a.active{background:#f9f9f9;border-left-color:#ef4350;color:#ef4350}
        .profile-main{flex:1;padding:2rem;overflow-x:auto}
        .card{background:#fff;border-radius:.8rem;box-shadow:0 1px 6px rgba(0,0,0,.08);padding:2rem;margin-bottom:2rem}
        .card h2{font-size:1.8rem;margin-bottom:1.5rem}
        .card h3{font-size:1.5rem;margin-bottom:1rem}
        table{width:100%;border-collapse:collapse;font-size:1.3rem}
        table th{text-align:left;padding:1rem 1.2rem;border-bottom:2px solid #eee;color:#666;font-weight:600;text-transform:uppercase;font-size:1.1rem;white-space:nowrap}
        table td{padding:1rem 1.2rem;border-bottom:1px solid #f5f5f5;vertical-align:middle}
        .badge{display:inline-block;padding:.3rem .8rem;border-radius:1rem;font-size:1.1rem;font-weight:600}
        .badge-completed{background:#d4edda;color:#155724}
        .badge-pending{background:#fff3cd;color:#856404}
        .btn{display:inline-block;padding:.6rem 1.4rem;font-size:1.2rem;font-weight:600;border:1px solid #ef4350;color:#ef4350;background:0 0;cursor:pointer;border-radius:.4rem;transition:.3s;text-decoration:none;font-family:RNSSanz,sans-serif}
        .btn:hover{background:#ef4350;color:#fff}
        .btn-black{background:#23282d;color:#fff;border-color:#23282d}
        .btn-black:hover{background:#000}
        .form-row{margin-bottom:1.5rem}
        .form-row label{display:block;font-weight:600;margin-bottom:.4rem;font-size:1.3rem}
        .form-row input,.form-row select,.form-row textarea{width:100%;padding:1rem;border:1px solid #ddd;border-radius:.4rem;font-size:1.4rem;font-family:RNSSanz,sans-serif;background:#fff}
        .form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:0;border-color:#ef4350}
        .form-row.half{display:flex;gap:1.5rem}
        .form-row.half > div{flex:1}
        .toast{position:fixed;top:2rem;right:2rem;padding:1.2rem 2rem;border-radius:.6rem;color:#fff;font-weight:600;z-index:2000;animation:slideIn .3s;max-width:40rem}
        .toast-success{background:#28a745}
        .toast-error{background:#dc3545}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .empty-state{text-align:center;padding:3rem 2rem;color:#999;font-size:1.4rem}
        .msg-item{padding:1rem 0;border-bottom:1px solid #f0f0f0}
        .msg-item:last-child{border-bottom:0}
        .msg-item .msg-subject{font-weight:600;margin-bottom:.3rem}
        .msg-item .msg-body{color:#666;margin-bottom:.3rem}
        .msg-item .msg-date{font-size:1.1rem;color:#999}
        .deposit-note{background:#fff3cd;color:#856404;padding:1.5rem;border-radius:.6rem;margin-bottom:2rem;font-size:1.3rem}
        .hidden{display:none}
        .currency-selector{margin:.8rem 0}
        .currency-selector select{font-size:1.3rem;padding:.4rem .8rem;border:1px solid #ddd;border-radius:.4rem;background:#fff;font-family:RNSSanz,sans-serif;cursor:pointer;color:#555}
        .currency-selector select:focus{outline:0;border-color:#ef4350}
        .balance-card .amount .currency-symbol{font-size:2.5rem;vertical-align:super;margin-right:.2rem;color:#ef4350}
        .rate-info{font-size:1.1rem;color:#999;margin-top:.3rem}
    </style>

<link rel="stylesheet" href="/assets/css/custom.css"></head>
<body>
    <div class="profile-header">
        <div class="greeting">Welcome, <strong id="client-name">Client</strong></div>
        <a class="logout" onclick="logout()">Sign Out</a>
    </div>
    <div class="profile-layout">
        <nav class="profile-sidebar">
            <a href="#" class="active" onclick="showSection('overview')">Overview</a>
            <a href="#" onclick="showSection('transactions')">Transactions</a>
            <a href="#" onclick="showSection('withdraw')">Withdraw</a>
            <a href="#" onclick="showSection('messages')">Messages</a>
            <a href="#" onclick="showSection('settings')">Settings</a>
        </nav>
        <main class="profile-main" id="main-content"></main>
    </div>
    <div id="toast-container"></div>
    <script>
    var clientData = JSON.parse(localStorage.getItem('client'));
    if (!clientData) { window.location.href = '/profile/login.html'; }
    var clientId = clientData.id;
    function toast(msg, type) { type = type || 'success'; var c = document.getElementById('toast-container'); var t = document.createElement('div'); t.className = 'toast toast-' + type; t.textContent = msg; c.appendChild(t); setTimeout(function() { t.remove(); }, 4000); }
    function logout() { localStorage.removeItem('client'); window.location.href = '/profile/login.html'; }
    function showSection(name) {
        document.querySelectorAll('.profile-sidebar a').forEach(function(a) { a.classList.remove('active'); });
        var links = document.querySelectorAll('.profile-sidebar a');
        for (var i = 0; i < links.length; i++) { if (links[i].getAttribute('href') === '#' + name) links[i].classList.add('active'); }
        if (name === 'overview') renderOverview();
        if (name === 'transactions') renderTransactions();
        if (name === 'withdraw') renderWithdraw();
        if (name === 'messages') renderMessages();
        if (name === 'settings') renderSettings();
    }
    document.getElementById('client-name').textContent = clientData.first_name + ' ' + clientData.last_name;
    function refreshClientData(cb) {
        fetch('/api/client/data/' + clientId).then(function(r) { return r.json(); }).then(function(data) {
            clientData = data; localStorage.setItem('client', JSON.stringify(data));
            document.getElementById('client-name').textContent = data.first_name + ' ' + data.last_name;
            if (cb) cb(data);
        }).catch(function() { if (cb) cb(null); });
    }
    var rates = null;
    var ratesCurrency = 'USD';
    var CURRENCY_SYMBOLS = { USD: '$', CAD: 'C$', EUR: '\u20ac', CHF: 'CHF', AED: 'AED' };
    var CURRENCY_NAMES = { USD: 'USD - US Dollar', CAD: 'CAD - Canadian Dollar', EUR: 'EUR - Euro', CHF: 'CHF - Swiss Franc', AED: 'AED - UAE Dirham' };
    var rateTimestamp = 0;
    function fetchRates(cb) {
        var now = Date.now();
        if (rates && now - rateTimestamp < 3600000) { if (cb) cb(rates); return; }
        var cached = localStorage.getItem('exchange_rates');
        if (cached) { try { var p = JSON.parse(cached); if (now - p.ts < 3600000) { rates = p.rates; ratesCurrency = p.base; rateTimestamp = p.ts; if (cb) cb(rates); return; } } catch(e) {} }
        fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json').then(function(r) { return r.json(); }).then(function(data) {
            rates = data.usd; ratesCurrency = 'USD'; rateTimestamp = now;
            localStorage.setItem('exchange_rates', JSON.stringify({ rates: rates, base: 'USD', ts: now }));
            if (cb) cb(rates);
        }).catch(function() {
            rates = { cad: 1.36, eur: 0.93, chf: 0.89, aed: 3.67 };
            ratesCurrency = 'USD'; rateTimestamp = now;
            if (cb) cb(rates);
        });
    }
    function convertBalance(usd, toCurrency) {
        if (!rates) return usd;
        if (toCurrency === 'USD') return usd;
        var key = toCurrency.toLowerCase();
        var rate = rates[key] || 1;
        return usd * rate;
    }
    function getCurrencySymbol(curr) { return CURRENCY_SYMBOLS[curr] || '$'; }
    function formatCurrency(amount, currency) {
        return getCurrencySymbol(currency) + ' ' + Number(amount).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function updateCurrencyDisplay() {
        var sel = document.getElementById('currency-select');
        var balEl = document.getElementById('overview-balance');
        var symEl = document.getElementById('currency-symbol');
        var rateEl = document.getElementById('rate-info');
        if (!sel || !balEl) return;
        var curr = sel.value;
        localStorage.setItem('preferred_currency', curr);
        var usdBalance = clientData.balance || 0;
        var converted = convertBalance(usdBalance, curr);
        symEl.textContent = getCurrencySymbol(curr);
        balEl.textContent = Number(converted).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        if (rateEl && curr !== 'USD' && rates) {
            var key = curr.toLowerCase();
            var rate = rates[key];
            if (rate) rateEl.textContent = '1 USD = ' + getCurrencySymbol(curr) + ' ' + Number(rate).toFixed(4);
            else rateEl.textContent = '';
        } else if (rateEl) { rateEl.textContent = ''; }
    }
    function renderOverview() {
        var main = document.getElementById('main-content');
        var savedCurrency = localStorage.getItem('preferred_currency') || 'USD';
        var opts = '';
        var currList = ['USD','CAD','EUR','CHF','AED'];
        for (var i = 0; i < currList.length; i++) {
            var c = currList[i];
            opts += '<option value="' + c + '"' + (c === savedCurrency ? ' selected' : '') + '>' + CURRENCY_NAMES[c] + '</option>';
        }
        main.innerHTML = '<div class="balance-card"><div class="label">Available Balance</div><div class="amount"><span class="currency-symbol" id="currency-symbol">' + getCurrencySymbol(savedCurrency) + '</span><span id="overview-balance">' + Number(convertBalance(clientData.balance || 0, savedCurrency)).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + '</span></div><div class="currency-selector"><select id="currency-select" onchange="updateCurrencyDisplay()">' + opts + '</select></div><div class="rate-info" id="rate-info"></div><div class="account-info">' + clientData.account_type.charAt(0).toUpperCase() + clientData.account_type.slice(1) + ' Account &middot; ' + clientData.subsidiary + ' &middot; Branch: ' + clientData.branch + '</div></div><div class="deposit-note"><strong>Making a deposit?</strong> Visit any PROVEN Bank branch to deposit funds directly. Our tellers will update your balance instantly.</div><div class="card"><h2>Quick Actions</h2><div style="display:flex;gap:1rem;flex-wrap:wrap"><button class="btn" onclick="showSection(\'transactions\')">View Transactions</button><button class="btn" onclick="showSection(\'withdraw\')">Make a Withdrawal</button><button class="btn" onclick="showSection(\'messages\')">Messages</button></div></div>';
        refreshClientData(function(data) {
            if (data) {
                clientData = data;
                var curr = localStorage.getItem('preferred_currency') || 'USD';
                var converted = convertBalance(data.balance || 0, curr);
                document.getElementById('overview-balance').textContent = Number(converted).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                document.getElementById('currency-symbol').textContent = getCurrencySymbol(curr);
                updateCurrencyDisplay();
            }
        });
        fetchRates(function() { updateCurrencyDisplay(); });
    }
    function renderTransactions() {
        var main = document.getElementById('main-content');
        main.innerHTML = '<div class="card"><h2>Historique des transactions</h2><div id="txn-list"><div class="empty-state">Chargement...</div></div></div>';
        fetch('/api/client/transactions/' + clientId).then(function(r) { return r.json(); }).then(function(data) {
            var el = document.getElementById('txn-list');
            if (data.length === 0) { el.innerHTML = '<div class="empty-state">Aucune transaction</div>'; return; }
            var html = '<table><thead><tr><th>Date</th><th>Type</th><th>Montant</th><th>Description</th><th>Statut</th></tr></thead><tbody>';
            data.forEach(function(t) {
                var badge = t.status === 'completed' || t.status === 'approved' ? 'badge-completed' : 'badge-pending';
                var statusLabels = { 'pending': 'En cours', 'completed': 'Complété', 'approved': 'Approuvé', 'rejected': 'Rejeté' };
                var label = statusLabels[t.status] || (t.status.charAt(0).toUpperCase() + t.status.slice(1));
                var typeLabel = t.type.charAt(0).toUpperCase() + t.type.slice(1);
                var curr = localStorage.getItem('preferred_currency') || 'USD';
                var convAmt = convertBalance(t.amount, curr);
                var sym = getCurrencySymbol(curr);
                html += '<tr><td>' + new Date(t.created_at).toLocaleDateString() + '</td><td>' + typeLabel + '</td><td><strong>' + sym + ' ' + Number(convAmt).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + '</strong></td><td>' + t.description + '</td><td><span class="badge ' + badge + '">' + label + '</span></td></tr>';
            });
            el.innerHTML = html + '</tbody></table>';
        });
    }
    function renderWithdraw() {
        var main = document.getElementById('main-content');
        var curr = localStorage.getItem('preferred_currency') || 'USD';
        var sym = getCurrencySymbol(curr);
        var usdBalance = clientData.balance || 0;
        var displayBal = convertBalance(usdBalance, curr);
        var balStr = Number(displayBal).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        var currOpts = '';
        var currList = ['USD','CAD','EUR','CHF','AED'];
        for (var i = 0; i < currList.length; i++) {
            var c = currList[i];
            currOpts += '<option value="' + c + '"' + (c === curr ? ' selected' : '') + '>' + CURRENCY_NAMES[c] + '</option>';
        }
        var fullName = (clientData.first_name || '') + ' ' + (clientData.last_name || '');
        main.innerHTML = '<div class="card"><h2>Demande de retrait</h2><p style="margin-bottom:2rem;color:#666;">Soumettez une demande de retrait. Une fois approuvée par la banque, le montant sera déduit de votre solde.</p><p style="margin-bottom:1.5rem;font-size:1.4rem;color:#23282d;">Solde actuel : <strong>' + sym + ' ' + balStr + '</strong></p><div class="form-row"><label>Nom complet</label><input type="text" id="w-full_name" value="' + esc(fullName) + '"></div><div class="form-row"><label>Numéro de compte (RIB)</label><input type="text" id="w-rib" placeholder="Numéro de compte"></div><div class="form-row"><label>IBAN</label><input type="text" id="w-iban" placeholder="IBAN"></div><div class="form-row"><label>Swift (BIC)</label><input type="text" id="w-swift" placeholder="Code SWIFT/BIC"></div><div class="form-row half"><div><label>Numéro de transit</label><input type="text" id="w-transit" placeholder="Transit"></div><div><label>Numéro institutionnel</label><input type="text" id="w-institution" placeholder="Institution"></div></div><div class="form-row"><label>Référence</label><input type="text" id="w-reference" placeholder="Référence (optionnelle)"></div><div class="form-row half"><div><label>Montant à retirer</label><input type="number" id="w-amount" step="0.01" min="0.01" placeholder="0.00"></div><div><label>Devise</label><select id="w-currency">' + currOpts + '</select></div></div><button class="btn btn-black" onclick="submitWithdrawal()" style="margin-top:1rem">Soumettre la demande de retrait</button></div>';
    }
    function submitWithdrawal() {
        var fullName = document.getElementById('w-full_name').value.trim();
        var rib = document.getElementById('w-rib').value.trim();
        var iban = document.getElementById('w-iban').value.trim();
        var swift = document.getElementById('w-swift').value.trim();
        var transit = document.getElementById('w-transit').value.trim();
        var institution = document.getElementById('w-institution').value.trim();
        var reference = document.getElementById('w-reference').value.trim();
        var rawAmount = Number(document.getElementById('w-amount').value);
        var currency = document.getElementById('w-currency').value;
        if (!fullName) { toast('Veuillez entrer votre nom complet', 'error'); return; }
        if (!rib) { toast('Veuillez entrer votre numéro de compte (RIB)', 'error'); return; }
        if (!rawAmount || rawAmount <= 0) { toast('Veuillez entrer un montant valide', 'error'); return; }
        var usdAmount = currency === 'USD' ? rawAmount : (rawAmount / (rates ? (rates[currency.toLowerCase()] || 1) : 1));
        if (usdAmount > (clientData.balance || 0)) { toast('Solde insuffisant', 'error'); return; }
        fetch('/api/withdrawals', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ client_id: clientId, amount: usdAmount, full_name: fullName, rib: rib, iban: iban, swift: swift, transit_number: transit, institutional_number: institution, reference: reference, currency: currency, amount_original: rawAmount }) }).then(function(r) { return r.json(); }).then(function(data) {
            if (data.success) { toast('Demande de retrait effectuée. Calcul de frais offshore et/ou frais de conversion en cours.'); document.getElementById('w-amount').value = ''; showSection('transactions'); }
        }).catch(function() { toast('Erreur de connexion', 'error'); });
    }
    function renderMessages() {
        var main = document.getElementById('main-content');
        main.innerHTML = '<div class="card"><h2>Messages</h2><div id="msg-list"><div class="empty-state">Loading...</div></div></div>';
        fetch('/api/messages/' + clientId).then(function(r) { return r.json(); }).then(function(data) {
            var el = document.getElementById('msg-list');
            if (data.length === 0) { el.innerHTML = '<div class="empty-state">No messages</div>'; return; }
            var html = '';
            data.forEach(function(m) { html += '<div class="msg-item"><div class="msg-subject">' + m.subject + '</div><div class="msg-body">' + m.body + '</div><div class="msg-date">' + new Date(m.created_at).toLocaleString() + '</div></div>'; });
            el.innerHTML = html;
        });
    }
    function renderSettings() {
        var c = clientData;
        var main = document.getElementById('main-content');
        main.innerHTML = '<div class="card"><h2>Account Settings</h2><p style="margin-bottom:2rem;color:#666;">Update your personal information and password.</p><form id="settings-form" onsubmit="return false;"><div class="form-row half"><div><label>First Name</label><input type="text" id="s-first_name" value="' + esc(c.first_name) + '"></div><div><label>Last Name</label><input type="text" id="s-last_name" value="' + esc(c.last_name) + '"></div></div><div class="form-row half"><div><label>Date of Birth</label><input type="text" id="s-date_of_birth" value="' + esc(c.date_of_birth) + '"></div><div><label>Passport Number</label><input type="text" id="s-passport_number" value="' + esc(c.passport_number) + '"></div></div><div class="form-row"><label>Email</label><input type="email" id="s-email" value="' + esc(c.email) + '"></div><div class="form-row half"><div><label>Telephone</label><input type="tel" id="s-telephone" value="' + esc(c.telephone) + '"></div><div><label>Cellphone</label><input type="tel" id="s-cellphone" value="' + esc(c.cellphone) + '"></div></div><div class="form-row"><label>Home Address</label><input type="text" id="s-home_address" value="' + esc(c.home_address || '') + '"></div><div class="form-row half"><div><label>City</label><input type="text" id="s-home_city" value="' + esc(c.home_city || '') + '"></div><div><label>Country</label><input type="text" id="s-home_country" value="' + esc(c.home_country || '') + '"></div></div><div class="form-row"><label>Branch</label><input type="text" id="s-branch" value="' + esc(c.branch || '') + '"></div><hr style="margin:2rem 0;border:0;border-top:1px solid #eee"><h3 style="margin-bottom:1.5rem">Change Password</h3><div class="form-row"><label>New Password (min 4 characters)</label><input type="password" id="s-new_password" placeholder="Leave blank to keep current"></div><button type="submit" class="btn btn-black" onclick="saveSettings()">Save Changes</button></form></div>';
    }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function saveSettings() {
        var fields = ['first_name','last_name','date_of_birth','passport_number','email','telephone','cellphone','home_address','home_city','home_country','branch'];
        var data = {};
        fields.forEach(function(f) { var el = document.getElementById('s-' + f); if (el) data[f] = el.value.trim(); });
        var newPass = document.getElementById('s-new_password').value;
        if (newPass && newPass.length >= 4) data.new_password = newPass;
        fetch('/api/client/profile/' + clientId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }).then(function(r) { return r.json(); }).then(function(resp) {
            if (resp.success) { clientData = resp.client; localStorage.setItem('client', JSON.stringify(resp.client)); document.getElementById('client-name').textContent = resp.client.first_name + ' ' + resp.client.last_name; toast('Settings saved successfully'); }
            else { toast('Error saving settings', 'error'); }
        }).catch(function() { toast('Connection error', 'error'); });
    }
    showSection('overview');
    </script>
</body>
</html>
