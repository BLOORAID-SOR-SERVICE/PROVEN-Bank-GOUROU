<!DOCTYPE html>
<html lang="en-US" class="js">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Admin Login | PROVEN Bank</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/assets/css/style.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicon/apple-touch-icon.png?02">
    <link rel="icon" type="image/png" href="/assets/img/favicon/favicon-32x32.png?02" sizes="32x32">
    <meta name="robots" content="noindex, nofollow">
    <style>
        body{background:#f2f2f2;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:2rem}
        .admin-login{background:#fff;padding:4rem;max-width:40rem;width:100%;box-shadow:0 2px 20px rgba(0,0,0,.1);border-radius:1rem;text-align:center}
        .admin-login h1{font-size:2.4rem;margin-bottom:.5rem}
        .admin-login p{color:#666;margin-bottom:3rem;font-size:1.4rem}
        .admin-login .form-row{border-bottom:2px solid #23282d;margin-bottom:2rem}
        .admin-login input{width:100%;border:0;padding:1rem 0;font-size:1.6rem;font-family:RNSSanz,sans-serif;background:0 0}
        .admin-login input:focus{outline:0}
        .admin-login .error{color:#ef4350;font-size:1.3rem;margin-bottom:1rem;display:none}
        .admin-logo{font-size:3rem;font-weight:700;color:#ef4350;margin-bottom:1rem;text-transform:uppercase;letter-spacing:.2em}
        .back-link{display:inline-block;margin-top:2rem;font-size:1.3rem;color:#999;text-decoration:none}
        .back-link:hover{color:#ef4350}
    </style>

<link rel="stylesheet" href="/assets/css/custom.css"></head>
<body>
    <div class="admin-login">
        <div class="admin-logo">PROVEN</div>
        <h1>Admin Access</h1>
        <p>Log in to access the administration panel</p>
        <div class="error" id="login-error">Invalid credentials</div>
        <form id="login-form" onsubmit="return false;">
            <div class="form-row">
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>
            <div class="form-row">
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <div class="form-bottom" style="justify-content:center">
                <button type="submit" class="button black" onclick="adminLogin()"><a>Sign In</a></button>
            </div>
        </form>
        <a class="back-link" href="/">&larr; Back to site</a>
    </div>
    <script>
    async function adminLogin() {
        var err = document.getElementById('login-error');
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value.trim();
        if (!username || !password) { err.style.display = 'block'; err.textContent = 'Please fill in all fields'; return; }
        try {
            var res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            var data = await res.json();
            if (res.ok) { localStorage.setItem('admin_token', data.token); window.location.href = '/admin/dashboard/'; }
            else { err.style.display = 'block'; err.textContent = data.error || 'Invalid credentials'; }
        } catch(e) { err.style.display = 'block'; err.textContent = 'Server connection error'; }
    }
    </script>
</body>
</html>
