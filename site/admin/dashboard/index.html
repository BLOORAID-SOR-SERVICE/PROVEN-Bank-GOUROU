<!DOCTYPE html>
<html lang="en-US" class="js">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Admin Dashboard | PROVEN Bank</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/assets/css/style.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicon/apple-touch-icon.png?02">
    <meta name="robots" content="noindex, nofollow">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#f2f2f2;font-family:RNSSanz,sans-serif;color:#23282d;font-size:1.4rem}
        .admin-header{background:#23282d;color:#fff;padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .admin-header h1{font-size:1.8rem;font-weight:600}
        .admin-header h1 span{color:#ef4350}
        .admin-header .logout{color:#fff;text-decoration:none;font-size:1.3rem;cursor:pointer}
        .admin-header .logout:hover{color:#ef4350}
        .admin-layout{display:flex;min-height:calc(100vh - 5.5rem)}
        .admin-sidebar{width:24rem;background:#fff;border-right:1px solid #ddd;padding:2rem 0;flex-shrink:0}
        .admin-sidebar a{display:block;padding:1.2rem 2rem;color:#23282d;text-decoration:none;font-size:1.4rem;border-left:3px solid transparent;cursor:pointer}
        .admin-sidebar a:hover,.admin-sidebar a.active{background:#f9f9f9;border-left-color:#ef4350;color:#ef4350}
        .admin-main{flex:1;padding:2rem;overflow-x:auto}
        .card{background:#fff;border-radius:.8rem;box-shadow:0 1px 6px rgba(0,0,0,.08);padding:2rem;margin-bottom:2rem}
        .card h2{font-size:1.8rem;margin-bottom:1.5rem}
        .card h3{font-size:1.5rem;margin-bottom:1rem}
        table{width:100%;border-collapse:collapse;font-size:1.3rem}
        table th{text-align:left;padding:1rem 1.2rem;border-bottom:2px solid #eee;color:#666;font-weight:600;text-transform:uppercase;font-size:1.1rem;white-space:nowrap}
        table td{padding:1rem 1.2rem;border-bottom:1px solid #f5f5f5;vertical-align:middle}
        table tr:hover td{background:#fafafa}
        table tr.clickable{cursor:pointer}
        .badge{display:inline-block;padding:.3rem .8rem;border-radius:1rem;font-size:1.1rem;font-weight:600}
        .badge-pending{background:#fff3cd;color:#856404}
        .badge-active{background:#d4edda;color:#155724}
        .badge-rejected{background:#f8d7da;color:#721c24}
        .btn{display:inline-block;padding:.6rem 1.4rem;font-size:1.2rem;font-weight:600;border:1px solid #ef4350;color:#ef4350;background:0 0;cursor:pointer;border-radius:.4rem;transition:.3s;text-decoration:none;font-family:RNSSanz,sans-serif}
        .btn:hover{background:#ef4350;color:#fff}
        .btn-sm{padding:.4rem 1rem;font-size:1.1rem}
        .btn-black{background:#23282d;color:#fff;border-color:#23282d}
        .btn-black:hover{background:#000}
        .btn-success{background:#28a745;color:#fff;border-color:#28a745}
        .btn-success:hover{background:#218838}
        .btn-danger{background:#dc3545;color:#fff;border-color:#dc3545}
        .btn-danger:hover{background:#c82333}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
        .modal-overlay.open{display:flex}
        .modal{background:#fff;border-radius:1rem;padding:3rem;max-width:50rem;width:90%;max-height:80vh;overflow-y:auto}
        .modal h2{font-size:1.8rem;margin-bottom:1.5rem}
        .modal .form-row{margin-bottom:1.5rem}
        .modal input,.modal select,.modal textarea{width:100%;padding:1rem;border:1px solid #ddd;border-radius:.4rem;font-size:1.4rem;font-family:RNSSanz,sans-serif}
        .modal textarea{min-height:8rem;resize:vertical}
        .modal .form-row label{display:block;font-weight:600;margin-bottom:.4rem;font-size:1.3rem}
        .modal-actions{display:flex;gap:1rem;justify-content:flex-end;margin-top:2rem}
        .client-detail-grid{display:grid;grid-template-columns:auto 1fr;gap:.6rem 1.5rem;font-size:1.3rem}
        .client-detail-grid .label{font-weight:600;color:#666}
        .filter-bar{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
        .filter-bar input,.filter-bar select{padding:.6rem 1rem;border:1px solid #ddd;border-radius:.4rem;font-size:1.3rem;font-family:RNSSanz,sans-serif}
        .toast{position:fixed;top:2rem;right:2rem;padding:1.2rem 2rem;border-radius:.6rem;color:#fff;font-weight:600;z-index:2000;animation:slideIn .3s;max-width:40rem}
        .toast-success{background:#28a745}
        .toast-error{background:#dc3545}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .section-title{font-size:1.6rem;font-weight:600;margin-bottom:1rem;color:#23282d;display:flex;align-items:center;gap:1rem}
        .count-badge{background:#ef4350;color:#fff;border-radius:1rem;padding:.1rem .7rem;font-size:1.1rem}
        .msg-item{padding:1rem 0;border-bottom:1px solid #f0f0f0;font-size:1.3rem}
        .msg-item:last-child{border-bottom:0}
        .msg-item .msg-subject{font-weight:600;margin-bottom:.3rem}
        .msg-item .msg-body{color:#666;margin-bottom:.3rem}
        .msg-item .msg-date{font-size:1.1rem;color:#999}
        .empty-state{text-align:center;padding:4rem 2rem;color:#999;font-size:1.4rem}
        .currency-selector select{font-size:1.3rem;padding:.4rem .8rem;border:1px solid #ddd;border-radius:.4rem;background:#fff;font-family:RNSSanz,sans-serif;cursor:pointer;color:#555;margin-left:.5rem}
        .currency-selector select:focus{outline:0;border-color:#ef4350}
        .currency-symbol{color:#ef4350}
        .tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:2px solid #eee}
        .tabs button{padding:1rem 2rem;border:0;background:0 0;font-size:1.4rem;font-weight:600;cursor:pointer;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:RNSSanz,sans-serif}
        .tabs button.active{color:#ef4350;border-bottom-color:#ef4350}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
        .text-right{text-align:right}
    </style>

<link rel="stylesheet" href="/assets/css/custom.css"></head>
<body>
    <div class="admin-header">
        <h1>PROVEN <span>Bank</span> — Admin</h1>
        <a class="logout" onclick="logout()">Sign Out</a>
    </div>
    <div class="admin-layout">
        <nav class="admin-sidebar">
            <a href="#" class="active" onclick="showSection('clients')">Clients</a>
            <a href="#" onclick="showSection('broadcast')">Broadcast</a>
        </nav>
        <main class="admin-main" id="main-content">
        </main>
    </div>
    <div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-content"></div></div>
    <div id="toast-container"></div>
    <script>
    var token = localStorage.getItem('admin_token');
    if (!token) { window.location.href = '/admin/'; }
    var clients = [];
    var currentClient = null;
    function api(path, opts) {
        opts = opts || {};
        opts.headers = opts.headers || {};
        opts.headers['Content-Type'] = 'application/json';
        opts.headers['x-admin-token'] = token;
        return fetch(path, opts).then(function(r) {
            if (r.status === 401) { localStorage.removeItem('admin_token'); window.location.href = '/admin/'; }
            return r.json();
        });
    }
    function logout() { localStorage.removeItem('admin_token'); window.location.href = '/admin/'; }
    function toast(msg, type) {
        type = type || 'success';
        var c = document.getElementById('toast-container');
        var t = document.createElement('div');
        t.className = 'toast toast-' + type;
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(function() { t.remove(); }, 10000);
    }
    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
    document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    var rates = null;
    var ratesCurrency = 'USD';
    var rateTimestamp = 0;
    var CURRENCY_SYMBOLS = { USD: '$', CAD: 'C$', EUR: '\u20ac', CHF: 'CHF', AED: 'AED' };
    var CURRENCY_NAMES = { USD: 'USD - US Dollar', CAD: 'CAD - Canadian Dollar', EUR: 'EUR - Euro', CHF: 'CHF - Swiss Franc', AED: 'AED - UAE Dirham' };
    function fetchRates(cb) {
        var now = Date.now();
        if (rates && now - rateTimestamp < 3600000) { if (cb) cb(rates); return; }
        var cached = localStorage.getItem('exchange_rates');
        if (cached) { try { var p = JSON.parse(cached); if (now - p.ts < 3600000) { rates = p.rates; ratesCurrency = p.base; rateTimestamp = p.ts; if (cb) cb(rates); return; } } catch(e) {} }
        fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json').then(function(r) { return r.json(); }).then(function(data) {
            rates = data.usd; ratesCurrency = 'USD'; rateTimestamp = now;
            localStorage.setItem('exchange_rates', JSON.stringify({ rates: rates, base: 'USD', ts: now }));
            if (cb) cb(rates);
        }).catch(function() {
            rates = { cad: 1.36, eur: 0.93, chf: 0.89, aed: 3.67 };
            ratesCurrency = 'USD'; rateTimestamp = now;
            if (cb) cb(rates);
        });
    }
    function convertBalance(usd, toCurrency) {
        if (!rates) return usd;
        if (toCurrency === 'USD') return usd;
        var key = toCurrency.toLowerCase();
        var rate = rates[key] || 1;
        return usd * rate;
    }
    function getCurrencySymbol(curr) { return CURRENCY_SYMBOLS[curr] || '$'; }
    function getSavedCurrency() { return localStorage.getItem('admin_preferred_currency') || 'USD'; }
    function saveCurrency(curr) { localStorage.setItem('admin_preferred_currency', curr); }
    function formatConverted(usd, currency) {
        var converted = convertBalance(usd, currency);
        return getCurrencySymbol(currency) + ' ' + Number(converted).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function showModal(html) { document.getElementById('modal-content').innerHTML = html; document.getElementById('modal-overlay').classList.add('open'); }
    function showSection(name) {
        document.querySelectorAll('.admin-sidebar a').forEach(function(a) { a.classList.remove('active'); });
        var links = document.querySelectorAll('.admin-sidebar a');
        for (var i = 0; i < links.length; i++) { if (links[i].getAttribute('href') === '#' + name) links[i].classList.add('active'); }
        if (name === 'clients') renderClientList();
        if (name === 'broadcast') renderBroadcast();
    }
    var pendingWithdrawals = {};
    function renderClientList() {
        var main = document.getElementById('main-content');
        main.innerHTML = '<div class="card"><h2>Account Requests</h2><div class="filter-bar"><input type="text" id="search-input" placeholder="Search..." oninput="filterClients()"><select id="status-filter" onchange="filterClients()"><option value="">All statuses</option><option value="pending">Pending</option><option value="active">Active</option><option value="rejected">Rejected</option></select></div><div id="client-table-wrap"><div class="empty-state">Loading...</div></div></div>';
        api('/api/admin/clients').then(function(data) {
            clients = data;
            api('/api/admin/withdrawals/pending').then(function(ids) {
                pendingWithdrawals = {};
                ids.forEach(function(id) { pendingWithdrawals[id] = true; });
                filterClients();
            });
        });
    }
    function filterClients() {
        var q = (document.getElementById('search-input').value || '').toLowerCase();
        var s = document.getElementById('status-filter').value;
        var filtered = clients.filter(function(c) {
            var match = c.first_name.toLowerCase().indexOf(q) > -1 || c.last_name.toLowerCase().indexOf(q) > -1 || c.email.toLowerCase().indexOf(q) > -1 || c.username.toLowerCase().indexOf(q) > -1;
            if (s && c.status !== s) match = false;
            return match;
        });
        if (filtered.length === 0) { document.getElementById('client-table-wrap').innerHTML = '<div class="empty-state">No clients found</div>'; return; }
        var html = '<table><thead><tr><th>Name</th><th>Email</th><th>Account</th><th>Type</th><th>Status</th><th>Date</th><th></th></tr></thead><tbody>';
        filtered.forEach(function(c) {
            var badge = c.status === 'active' ? 'badge-active' : c.status === 'rejected' ? 'badge-rejected' : 'badge-pending';
            var label = c.status === 'active' ? 'Active' : c.status === 'rejected' ? 'Rejected' : 'Pending';
            html += '<tr class="clickable" onclick="showClient(\'' + c.id + '\')">';
            html += '<td><strong>' + c.first_name + ' ' + c.last_name + '</strong>' + (pendingWithdrawals[c.id] ? ' <span class="badge badge-pending" style="background:#ef4350;color:#fff;font-size:1rem;vertical-align:middle">Pending withdrawal</span>' : '') + '</td>';
            html += '<td>' + c.email + '</td><td>' + c.account_type + '</td><td>' + (c.subsidiary || '-') + '</td>';
            html += '<td><span class="badge ' + badge + '">' + label + '</span></td>';
            html += '<td>' + new Date(c.created_at).toLocaleDateString() + '</td>';
            html += '<td><button class="btn btn-sm" onclick="event.stopPropagation();showClient(\'' + c.id + '\')">Details</button></td></tr>';
        });
        document.getElementById('client-table-wrap').innerHTML = html + '</tbody></table>';
    }
    function showClient(id) {
        api('/api/admin/clients/' + id).then(function(client) {
            currentClient = client;
            var curr = getSavedCurrency();
            var opts = '';
            var currList = ['USD','CAD','EUR','CHF','AED'];
            for (var i = 0; i < currList.length; i++) { var c = currList[i]; opts += '<option value="' + c + '"' + (c === curr ? ' selected' : '') + '>' + CURRENCY_NAMES[c] + '</option>'; }
            var badge = client.status === 'active' ? 'badge-active' : client.status === 'rejected' ? 'badge-rejected' : 'badge-pending';
            var label = client.status === 'active' ? 'Active' : client.status === 'rejected' ? 'Rejected' : 'Pending';
            var bal = (client.balance || 0).toFixed(2);
            var html = '<div class="flex-between"><h2>' + client.first_name + ' ' + client.last_name + ' <span class="currency-selector"><select id="admin-currency-select" onchange="changeAdminCurrency()">' + opts + '</select></span></h2><button class="btn btn-sm" onclick="renderClientList()">&larr; Back</button></div>';
            html += '<div class="card"><div class="client-detail-grid">';
            html += '<span class="label">ID:</span><span>' + client.id + '</span>';
            html += '<span class="label">First Name:</span><span>' + client.first_name + '</span>';
            html += '<span class="label">Last Name:</span><span>' + client.last_name + '</span>';
            html += '<span class="label">Date of Birth:</span><span>' + client.date_of_birth + '</span>';
            html += '<span class="label">Passport:</span><span>' + client.passport_number + '</span>';
            html += '<span class="label">Email:</span><span>' + client.email + '</span>';
            html += '<span class="label">Telephone:</span><span>' + client.telephone + '</span>';
            html += '<span class="label">Cellphone:</span><span>' + client.cellphone + '</span>';
            html += '<span class="label">Username:</span><span>' + client.username + '</span>';
            html += '<span class="label">Account Type:</span><span>' + client.account_type + '</span>';
            if (client.corporate_full_name) html += '<span class="label">Company Name:</span><span>' + client.corporate_full_name + '</span>';
            html += '<span class="label">Subsidiary:</span><span>' + client.subsidiary + '</span>';
            html += '<span class="label">City:</span><span>' + client.home_city + '</span>';
            html += '<span class="label">Country:</span><span>' + client.home_country + '</span>';
            html += '<span class="label">Balance:</span><span><strong><span class="currency-symbol">' + getCurrencySymbol(curr) + '</span> ' + Number(convertBalance(client.balance || 0, curr)).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + '</strong></span>';
            html += '<span class="label">Password:</span><span>' + (client.password ? '********' : '<span style="color:#ef4350">Not set</span>') + '</span>';
            html += '<span class="label">Status:</span><span><span class="badge ' + badge + '">' + label + '</span></span>';
            html += '<span class="label">Registered:</span><span>' + new Date(client.created_at).toLocaleString() + '</span>';
            if (client.identity_document) html += '<span class="label">ID Document:</span><span><a href="/uploads/' + client.identity_document + '" target="_blank" class="btn btn-sm">View Document</a></span>';
            if (client.residence_certificate) html += '<span class="label">Residence Cert:</span><span><a href="/uploads/' + client.residence_certificate + '" target="_blank" class="btn btn-sm">View Document</a></span>';
            html += '</div></div>';
            html += '<div class="tabs">';
            if (client.status === 'pending') html += '<button class="active" onclick="switchTab(this,\'activate\')">Activate</button>';
            html += '<button' + (client.status !== 'pending' ? ' class="active"' : '') + ' onclick="switchTab(this,\'finance\')">Finance</button>';
            html += '<button onclick="switchTab(this,\'withdrawals\')">Withdrawals</button>';
            html += '<button onclick="switchTab(this,\'messages\')">Messaging</button></div>';
            if (client.status === 'pending') {
                html += '<div class="card tab-content active" id="tab-activate"><h3>Activate Account</h3><p style="margin-bottom:1.5rem;color:#666;">Set a default password for the client and activate their account.</p><div class="form-row"><label>Default Password</label><input type="text" id="activate-password" value="default123"></div><button class="btn btn-success" onclick="activateAccount(\'' + client.id + '\')">Activate Account</button></div>';
            }
            html += '<div class="card tab-content' + (client.status !== 'pending' ? ' active' : '') + '" id="tab-finance"><h3>Credit Account</h3><div style="display:flex;gap:1rem;align-items:end;flex-wrap:wrap"><div class="form-row" style="margin:0;flex:1;min-width:15rem"><label>Amount ($ USD)</label><input type="number" id="credit-amount" step="0.01" min="0.01"></div><button class="btn btn-success" onclick="creditAccount(\'' + client.id + '\')">Credit</button></div><hr style="margin:2rem 0;border:0;border-top:1px solid #eee"><h3>Set Balance</h3><div style="display:flex;gap:1rem;align-items:end;flex-wrap:wrap"><div class="form-row" style="margin:0;flex:1;min-width:15rem"><label>New Balance ($ USD)</label><input type="number" id="balance-amount" step="0.01" min="0"></div><button class="btn" onclick="setBalance(\'' + client.id + '\')">Apply</button></div><hr style="margin:2rem 0;border:0;border-top:1px solid #eee"><h3>Current Balance: <strong style="color:#ef4350"><span class="currency-symbol">' + getCurrencySymbol(curr) + '</span> ' + Number(convertBalance(client.balance || 0, curr)).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + '</strong></h3></div>';
            html += '<div class="card tab-content" id="tab-withdrawals"><h3>Withdrawal Requests</h3><div id="withdrawals-list"><div class="empty-state">Loading...</div></div></div>';
            html += '<div class="card tab-content" id="tab-messages"><h3>Messaging</h3><div style="margin-bottom:1.5rem"><div class="form-row"><label>Subject</label><input type="text" id="msg-subject" placeholder="Message subject"></div><div class="form-row"><label>Message</label><textarea id="msg-body" placeholder="Write your message..."></textarea></div><button class="btn" onclick="sendMessage(\'' + client.id + '\')">Send Message</button></div><hr style="margin:2rem 0;border:0;border-top:1px solid #eee"><h3>Sent Messages</h3><div id="messages-list"><div class="empty-state">Loading...</div></div></div>';
            document.getElementById('main-content').innerHTML = html;
            loadWithdrawals(client.id);
            loadMessages(client.id);
        });
        fetchRates(function() {});
    }
    function changeAdminCurrency() {
        var sel = document.getElementById('admin-currency-select');
        if (!sel) return;
        var curr = sel.value;
        saveCurrency(curr);
        if (currentClient) showClient(currentClient.id);
    }
    function switchTab(btn, tabId) {
        var parent = btn.parentElement;
        var tabs = parent.querySelectorAll('button');
        tabs.forEach(function(t) { t.classList.remove('active'); });
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
        document.getElementById('tab-' + tabId).classList.add('active');
    }
    function activateAccount(id) {
        var password = document.getElementById('activate-password').value;
        if (!password) { toast('Please set a password', 'error'); return; }
        api('/api/admin/clients/' + id + '/activate', { method: 'PUT', body: JSON.stringify({ password: password }) }).then(function(data) {
            if (data.success) { toast('Account activated. Password: ' + password); showClient(id); }
        });
    }
    function creditAccount(id) {
        var amount = document.getElementById('credit-amount').value;
        if (!amount || Number(amount) <= 0) { toast('Invalid amount', 'error'); return; }
        api('/api/admin/clients/' + id + '/credit', { method: 'PUT', body: JSON.stringify({ amount: Number(amount) }) }).then(function(data) {
            if (data.success) {
                var curr = getSavedCurrency();
                var convAmt = formatConverted(Number(amount), curr);
                var convBal = formatConverted(data.balance, curr);
                toast('Account credited ' + convAmt + '. New balance: ' + convBal);
                document.getElementById('credit-amount').value = '';
                showClient(id);
            }
        });
    }
    function setBalance(id) {
        var amount = document.getElementById('balance-amount').value;
        if (!amount || Number(amount) < 0) { toast('Invalid amount', 'error'); return; }
        if (!confirm('Confirm balance change to $' + Number(amount).toFixed(2) + ' ?')) return;
        api('/api/admin/clients/' + id + '/balance', { method: 'PUT', body: JSON.stringify({ balance: Number(amount) }) }).then(function(data) {
            if (data.success) {
                var curr = getSavedCurrency();
                var convBal = formatConverted(data.balance, curr);
                toast('Balance changed. Old: ' + formatConverted(data.old_balance, curr) + ' \u2192 New: ' + convBal);
                document.getElementById('balance-amount').value = '';
                showClient(id);
            }
        });
    }
    function loadWithdrawals(clientId) {
        api('/api/admin/clients/' + clientId + '/withdrawals').then(function(data) {
            var el = document.getElementById('withdrawals-list');
            if (data.length === 0) { el.innerHTML = '<div class="empty-state">No withdrawal requests</div>'; return; }
            var html = '';
            data.forEach(function(w) {
                var badge = w.status === 'approved' ? 'badge-active' : w.status === 'rejected' ? 'badge-rejected' : 'badge-pending';
                var label = w.status === 'approved' ? 'Approved' : w.status === 'rejected' ? 'Rejected' : 'Pending';
                var wcurr = w.currency || 'USD';
                var wsym = getCurrencySymbol(wcurr);
                var amtDisplay = wsym + ' ' + Number(w.amount_original || w.amount).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
                if ((w.currency || 'USD') !== 'USD') {
                    amtDisplay += ' <span style="color:#999;font-size:1.2rem">($ ' + Number(w.amount).toFixed(2) + ' USD)</span>';
                }
                html += '<div style="border:1px solid #eee;border-radius:.8rem;padding:1.5rem;margin-bottom:1rem">';
                html += '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:1rem">';
                html += '<div><strong style="font-size:1.5rem">' + amtDisplay + '</strong></div>';
                html += '<div><span class="badge ' + badge + '">' + label + '</span></div></div>';
                html += '<div class="client-detail-grid">';
                if (w.full_name) html += '<span class="label">Full Name:</span><span>' + w.full_name + '</span>';
                if (w.rib) html += '<span class="label">RIB:</span><span>' + w.rib + '</span>';
                if (w.iban) html += '<span class="label">IBAN:</span><span>' + w.iban + '</span>';
                if (w.swift) html += '<span class="label">Swift:</span><span>' + w.swift + '</span>';
                if (w.transit_number) html += '<span class="label">Transit:</span><span>' + w.transit_number + '</span>';
                if (w.institutional_number) html += '<span class="label">Institution:</span><span>' + w.institutional_number + '</span>';
                if (w.reference) html += '<span class="label">Reference:</span><span>' + w.reference + '</span>';
                html += '<span class="label">Currency:</span><span>' + (w.currency || 'USD') + '</span>';
                html += '<span class="label">Date:</span><span>' + new Date(w.created_at).toLocaleString() + '</span>';
                html += '</div>';
                if (w.status === 'pending') {
                    html += '<div style="margin-top:1rem"><button class="btn btn-success" onclick="validateWithdrawal(\'' + w.id + '\')">Approve Withdrawal</button></div>';
                }
                html += '</div>';
            });
            el.innerHTML = html;
        });
    }
    function validateWithdrawal(id) {
        api('/api/admin/withdrawals/' + id + '/validate', { method: 'PUT' }).then(function(data) {
            if (data.success) { toast('Withdrawal approved'); if (currentClient) loadWithdrawals(currentClient.id); }
        });
    }
    function sendMessage(clientId) {
        var subject = document.getElementById('msg-subject').value.trim();
        var body = document.getElementById('msg-body').value.trim();
        if (!subject || !body) { toast('Please fill in the subject and message', 'error'); return; }
        api('/api/admin/messages', { method: 'POST', body: JSON.stringify({ client_id: clientId, subject: subject, body: body }) }).then(function(data) {
            if (data.success) { toast('Message sent to client'); document.getElementById('msg-subject').value = ''; document.getElementById('msg-body').value = ''; loadMessages(clientId); }
        });
    }
    function loadMessages(clientId) {
        api('/api/messages/' + clientId).then(function(data) {
            var el = document.getElementById('messages-list');
            if (data.length === 0) { el.innerHTML = '<div class="empty-state">No messages sent</div>'; return; }
            var html = '';
            data.forEach(function(m) { html += '<div class="msg-item"><div class="msg-subject">' + m.subject + '</div><div class="msg-body">' + m.body + '</div><div class="msg-date">' + new Date(m.created_at).toLocaleString() + '</div></div>'; });
            el.innerHTML = html;
        });
    }
    function renderBroadcast() {
        var main = document.getElementById('main-content');
        main.innerHTML = '<div class="card"><h2>Broadcast Message to All Clients</h2><p style="margin-bottom:2rem;color:#666;">This message will be sent to all registered clients.</p><div class="form-row"><label>Subject</label><input type="text" id="broadcast-subject" placeholder="Message subject"></div><div class="form-row"><label>Message</label><textarea id="broadcast-body" placeholder="Write your message..."></textarea></div><button class="btn btn-black" onclick="sendBroadcast()">Broadcast to All Clients</button></div>';
    }
    function sendBroadcast() {
        var subject = document.getElementById('broadcast-subject').value.trim();
        var body = document.getElementById('broadcast-body').value.trim();
        if (!subject || !body) { toast('Please fill in the subject and message', 'error'); return; }
        api('/api/admin/messages', { method: 'POST', body: JSON.stringify({ client_id: '*', subject: subject, body: body }) }).then(function(data) {
            if (data.success) { toast('Message broadcast to all clients'); document.getElementById('broadcast-subject').value = ''; document.getElementById('broadcast-body').value = ''; }
        });
    }
    showSection('clients');
    </script>
</body>
</html>
